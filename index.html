<!DOCTYPE html>
<html>
<head>
  <title>PSYLENS Journal</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a0ca3);
      color: white;
    }

    header {
      text-align: center;
      padding: 30px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .date {
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>✨ My Aesthetic Journal ✨</header>

<div class="container">

  <div class="card">
    <div class="date">Day 1</div>
    <p>Started my website journey. Confusing but exciting.</p>
  </div>

  <div class="card">
    <div class="date">Day 2</div>
    <p>Learned how GitHub works. Made mistakes but improved.</p>
  </div>

  <div class="card">
    <div class="date">Day 3</div>
    <p>Realized consistency matters more than perfection.</p>
  </div>

</div>

</body>
</html>
